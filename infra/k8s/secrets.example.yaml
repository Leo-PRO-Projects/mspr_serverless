# Modèle de secrets — À COPIER, renseigner, et NE JAMAIS committer rempli.
#   cp secrets.example.yaml secrets.yaml  (secrets.yaml est ignoré par .gitignore)
#
# Alternative recommandée pour les fonctions : OpenFaaS secrets (cf. infra/helm/README.md)
#   faas-cli secret create fernet-key --from-literal="<clé Fernet base64>"
#   faas-cli secret create db-password --from-literal="<mot de passe>"
#
# Générer une clé Fernet :
#   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
---
apiVersion: v1
kind: Secret
metadata:
  name: cofrap-db
  namespace: openfaas-fn
type: Opaque
stringData:
  db-password: "CHANGE_ME_db_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: cofrap-fernet
  namespace: openfaas-fn
type: Opaque
stringData:
  fernet-key: "CHANGE_ME_cle_fernet_base64"
